name: Flight Radar Auto Monitor

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: flight-radar-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  register-route:
    if: github.event_name == 'issues' && startsWith(github.event.issue.title, '[Flight Monitor]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate and save route
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = context.payload.issue.body || '';
            const configMatch = body.match(/<!-- FLIGHT_MONITOR_CONFIG\s*([\s\S]*?)\s*-->/);
            const actionMatch = body.match(/<!-- FLIGHT_MONITOR_ACTION\s*([\s\S]*?)\s*-->/);
            if (!configMatch && !actionMatch) throw new Error('没有找到航线配置或管理操作。请从网页重新提交。');
            const path = 'data/routes.json';
            const routes = JSON.parse(fs.readFileSync(path, 'utf8'));
            let message = '';
            if (actionMatch) {
              const action = JSON.parse(actionMatch[1]);
              if (!['pause','resume','delete'].includes(action.action) || !/^[a-z0-9-]+$/.test(action.id || '')) throw new Error('管理操作格式不合法。');
              const index = routes.findIndex(item => item.id === action.id);
              if (index < 0) throw new Error('找不到要管理的航线。');
              if (action.action === 'delete') { routes.splice(index, 1); message = '🗑️ 航线已删除。'; }
              else { routes[index].enabled = action.action === 'resume'; routes[index].updatedAt = new Date().toISOString(); message = action.action === 'resume' ? '▶️ 航线监控已恢复。' : '⏸️ 航线监控已暂停。'; }
            } else {
              const config = JSON.parse(configMatch[1]);
              const code = value => /^[A-Z]{3}$/.test(value || '');
              if (!code(config.originCode) || !code(config.destinationCode)) throw new Error('机场代码格式错误。');
              if (config.originCode === config.destinationCode) throw new Error('出发地和目的地不能相同。');
              if (!(config.stayMin >= 1 && config.stayMax >= config.stayMin && config.stayMax <= 60)) throw new Error('停留天数不合法。');
              if (!(config.targetPrice >= 1 && config.targetPrice <= 100000)) throw new Error('目标价格不合法。');
              const index = routes.findIndex(item => item.id === config.id);
              if (index >= 0) { routes[index] = config; message = '✅ 航线配置已更新。'; }
              else { routes.push(config); message = '✅ 航线已加入雷达。'; }
            }
            fs.writeFileSync(path, JSON.stringify(routes, null, 2) + '\n');
            await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body: `${message}\n\n变更已保存，将在下一轮每小时任务中生效。`});
            await github.rest.issues.update({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, state: 'closed'});
      - name: Commit route config
        run: |
          git config user.name "flight-radar-bot"
          git config user.email "flight-radar-bot@users.noreply.github.com"
          git add data/routes.json
          git diff --cached --quiet || git commit -m "Update flight monitors from issue #${{ github.event.issue.number }}"
          git push

  monitor:
    if: github.event_name != 'issues'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install FlyAI
        run: npm install --global @fly-ai/flyai-cli
      - name: Configure FlyAI
        env:
          FLYAI_API_KEY: ${{ secrets.FLYAI_API_KEY }}
        run: |
          if [ -z "$FLYAI_API_KEY" ]; then
            echo "请先在仓库 Settings → Secrets and variables → Actions 添加 FLYAI_API_KEY"
            exit 1
          fi
          flyai config set FLYAI_API_KEY "$FLYAI_API_KEY"
      - name: Scan every route
        run: node scripts/monitor.mjs
      - name: Send new-record alerts
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const configs = JSON.parse(fs.readFileSync('data/routes.json', 'utf8'));
            const configMap = new Map(configs.map(item => [item.id, item]));
            const results = JSON.parse(fs.readFileSync('data/results.json', 'utf8'));
            for (const result of results.routes || []) {
              if (!result.alert) continue;
              const config = configMap.get(result.id);
              if (!config) continue;
              const alert = result.alert;
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Fare Alert] ${config.originCode} → ${config.destinationCode} ¥${alert.total}`,
                body: `## 🎯 机票低价命中\n\n- 航线：${config.originCity}（${config.originCode}）→ ${config.destinationCity}（${config.destinationCode}）\n- 往返总价：**¥${alert.total}**\n- 日期：${alert.departDate} → ${alert.returnDate}\n- 条件：直飞，每程不高于 ¥${config.targetPrice}\n\n[打开飞猪查看实时票价](${alert.link})\n\n> 票价可能随时变化，请以下单页含税价格与行李规则为准。`,
                assignees: [context.repo.owner]
              });
            }
      - name: Publish latest prices
        run: |
          git config user.name "flight-radar-bot"
          git config user.email "flight-radar-bot@users.noreply.github.com"
          git add data/results.json
          git diff --cached --quiet || git commit -m "Update hourly flight prices"
          git push
